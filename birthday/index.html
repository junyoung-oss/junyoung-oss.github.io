<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>윤서의 생일</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;

        min-height: 100vh;

        background: linear-gradient(180deg, #080d22, #253b63);

        color: white;

        font-family: "Nanum Pen Script", cursive;

        overflow: hidden;
      }

      /* 별 */

      .star {
        position: fixed;

        width: 3px;

        height: 3px;

        background: white;

        border-radius: 50%;

        opacity: 0.5;

        animation: twinkle 3s infinite;
      }

      @keyframes twinkle {
        50% {
          opacity: 1;

          transform: scale(1.8);
        }
      }

      .container {
        min-height: 100vh;

        display: flex;

        justify-content: center;

        align-items: center;

        padding: 25px;
      }

      .card {
        width: 100%;

        max-width: 430px;

        text-align: center;
      }

      h1 {
        font-size: 60px;

        line-height: 1.3;

        margin: 0;
      }

      .subtitle {
        font-size: 38px;

        margin-top: 10px;
      }

      .message {
        margin-top: 35px;

        font-size: 30px;

        line-height: 1.8;
      }

      button {
        margin-top: 30px;

        padding: 15px 35px;

        border-radius: 40px;

        border: 1px solid rgba(255, 255, 255, 0.4);

        background: rgba(255, 255, 255, 0.15);

        color: white;

        font-family: inherit;

        font-size: 27px;
      }

      button:active {
        transform: scale(0.95);
      }

      .hidden {
        display: none;
      }

      /* 이야기 카드 */

      .story-area {
        display: none;
      }

      .story-card {
        margin-top: 35px;

        background: #fff8e8;

        color: #4a3a32;

        padding: 35px 25px;

        border-radius: 22px;

        font-size: 32px;

        line-height: 1.8;

        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);

        animation: cardOpen 0.8s;
      }

      @keyframes cardOpen {
        from {
          opacity: 0;

          transform: translateY(50px) rotate(-2deg);
        }

        to {
          opacity: 1;

          transform: translateY(0) rotate(0);
        }
      }

      .count {
        margin-top: 20px;

        font-size: 22px;
      }

      /* 편지 */

      .letter {
        display: none;

        margin-top: 35px;

        padding: 35px 25px;

        background: #fff8e8;

        color: #4a3a32;

        border-radius: 20px;

        font-size: 32px;

        line-height: 2;

        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);

        animation: cardOpen 0.8s;
      }

      .show {
        display: block;
      }

      /* 폭죽 */

      .confetti {
        position: fixed;

        top: -30px;

        z-index: 20;

        animation: fall 3s linear forwards;
      }

      @keyframes fall {
        to {
          transform: translateY(110vh) rotate(720deg);

          opacity: 0;
        }
      }
    </style>
  </head>

  <body>
    <audio id="bgm" loop>
      <source src="birthday-song.mp3" type="audio/mpeg" />
    </audio>

    <script>
      // 별 생성

      for (let i = 0; i < 80; i++) {
        let star = document.createElement("div");

        star.className = "star";

        star.style.left = Math.random() * 100 + "vw";

        star.style.top = Math.random() * 100 + "vh";

        star.style.animationDelay = Math.random() * 3 + "s";

        document.body.appendChild(star);
      }
    </script>

    <div class="container">
      <div class="card">
        <h1>
          🎂<br />

          생일 축하해
        </h1>

        <div class="subtitle">윤서야</div>

        <div class="message">
          작은 이야기를<br />

          준비했어.
        </div>

        <button class="music-btn" onclick="playMusic()">
          🎵 이걸 먼저 눌러줘
        </button>

        <div id="storyStart" class="hidden">
          <button onclick="beginStory()">📖 윤서 이야기 보기</button>
        </div>

        <div id="storyArea" class="story-area">
          <div id="storyCard" class="story-card"></div>

          <div id="count" class="count"></div>

          <button onclick="nextStory()">다음 이야기 →</button>
        </div>

        <div id="letter" class="letter">
          <p>
            윤서야,<br />

            생일 진심으로 축하해.
          </p>

          <p>
            너의 작은 취향들과<br />

            소중하게 생각하는 것들을<br />

            알아가는 시간이 참 좋았어.
          </p>

          <p>
            가족을 사랑하고,<br />

            맛있는 것을 좋아하고,<br />

            소소한 순간에 행복해하는<br />

            윤서라는 사람이 참 좋아.
          </p>

          <p>
            앞으로도 많이 웃고<br />

            행복한 날들이 가득했으면 좋겠다.
          </p>

          <p>
            하나님 안에서 늘 건강하고,<br />

            걸어가는 모든 길 위에<br />

            평안이 함께하길 기도할게.
          </p>

          <p>
            Peace Be With You<br />

            John 20:19
          </p>

          <br />

          - 준영 -
        </div>
      </div>
    </div>

    <script>
      let index = 0;

      const stories = [
        `
🤍 가족을 너무 사랑하는 윤서

<br><br>

가족 이야기를 할 때마다

따뜻해지는 모습이 참 좋았어.
`,

        `
🍛 카레를 굳이 밖에서<br>
사 먹긴 싫다던 윤서

<br><br>

솔직히...

그건 나도 인정 ㅎㅎ

집에서 먹는 카레가 맛있긴 하지 😌
`,

        `
🥘 곱창이 최애 음식인 윤서

<br><br>

이건 나도 좋아!

같이 맛있는 거 먹으러 가자 😊
`,

        `
🍗 닭발과 똥집을 먹으며<br>
행복해하던 윤서

<br><br>

닭발은 아직 조금 어렵지만...

똥집은 인정 ㅎㅎ
`,

        `
🍝 뇨끼를 좋아하는 윤서

<br><br>

이건 완전 공감!

나도 뇨끼 너무 좋아 😊
`
      ];

      function playMusic() {
        document.getElementById("bgm").play();

        document.querySelector(".music-btn").innerHTML =
          "🎵 음악이 흐르고 있어";

        document.getElementById("storyStart").classList.remove("hidden");
      }

      function beginStory() {
        document.querySelector(".message").innerHTML =
          "윤서에 대한<br>작은 이야기";

        document.getElementById("storyArea").style.display = "block";

        document.getElementById("storyStart").style.display = "none";

        nextStory();
      }

      function nextStory() {
        if (index >= stories.length) {
          fireworks();

          document.getElementById("storyArea").style.display = "none";

          document.getElementById("letter").classList.add("show");

          return;
        }

        document.getElementById("storyCard").innerHTML = stories[index];

        document.getElementById("count").innerHTML =
          `${index + 1} / ${stories.length}`;

        index++;
      }

      function fireworks() {
        let emojis = ["🎉", "🎊", "✨", "🎈"];

        for (let i = 0; i < 120; i++) {
          let c = document.createElement("div");

          c.className = "confetti";

          c.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];

          c.style.left = Math.random() * 100 + "vw";

          c.style.fontSize = 20 + Math.random() * 25 + "px";

          c.style.animationDelay = Math.random() * 2 + "s";

          document.body.appendChild(c);

          setTimeout(() => {
            c.remove();
          }, 4000);
        }
      }
    </script>
  </body>
</html>
