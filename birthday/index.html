<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>윤서의 생일</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;

        min-height: 100vh;

        background: linear-gradient(180deg, #090f24, #263e66);

        color: white;

        font-family: "Nanum Pen Script", cursive;

        overflow: hidden;
      }

      .container {
        min-height: 100vh;

        display: flex;

        justify-content: center;

        align-items: center;

        padding: 25px;
      }

      .card {
        width: 100%;

        max-width: 430px;

        text-align: center;
      }

      h1 {
        font-size: 60px;

        line-height: 1.2;
      }

      .subtitle {
        font-size: 38px;
      }

      .message {
        margin-top: 35px;

        font-size: 30px;

        line-height: 1.8;
      }

      button {
        margin-top: 30px;

        padding: 14px 35px;

        border-radius: 40px;

        border: 1px solid rgba(255, 255, 255, 0.4);

        background: rgba(255, 255, 255, 0.15);

        color: white;

        font-family: inherit;

        font-size: 27px;

        cursor: pointer;
      }

      .hidden {
        display: none;
      }

      /* 이야기 카드 */

      .story {
        display: none;
      }

      .story-card {
        margin-top: 35px;

        background: #fff8e8;

        color: #49392f;

        padding: 35px 25px;

        border-radius: 20px;

        font-size: 32px;

        line-height: 1.8;

        animation: appear 0.8s ease;
      }

      @keyframes appear {
        from {
          opacity: 0;

          transform: translateY(40px);
        }

        to {
          opacity: 1;

          transform: translateY(0);
        }
      }

      .count {
        margin-top: 20px;

        font-size: 22px;

        opacity: 0.8;
      }

      /* 편지 */

      .letter {
        display: none;

        margin-top: 35px;

        background: #fff8e8;

        color: #49392f;

        padding: 35px 25px;

        border-radius: 20px;

        font-size: 31px;

        line-height: 2;
      }

      .show {
        display: block;
      }

      /* 폭죽 */

      .confetti {
        position: fixed;

        top: -30px;

        z-index: 20;

        animation: fall 3s linear forwards;
      }

      @keyframes fall {
        to {
          transform: translateY(110vh) rotate(720deg);

          opacity: 0;
        }
      }

      .signature {
        margin-top: 30px;
      }
    </style>
  </head>

  <body>
    <audio id="bgm">
      <source src="birthday-song.mp3" type="audio/mpeg" />
    </audio>

    <div class="container">
      <div class="card">
        <h1>
          🎂<br />

          생일 축하해
        </h1>

        <div class="subtitle">윤서야</div>

        <div class="message">
          작은 이야기를<br />

          준비했어.
        </div>

        <button class="music-btn" onclick="playMusic()">
          🎵 이걸 먼저 눌러줘
        </button>

        <div id="startStory" class="hidden">
          <button onclick="startStory()">📖 윤서 이야기 보기</button>
        </div>

        <div id="storyArea" class="story">
          <div id="storyCard"></div>

          <div class="count" id="count"></div>

          <button onclick="nextStory()">다음 이야기 →</button>
        </div>

        <div id="letter" class="letter">
          <p>윤서야, 생일 진심으로 축하해.</p>

          <p>
            너의 작은 취향들과<br />

            소중하게 생각하는 것들을<br />

            알아가는 시간이 참 좋았어.
          </p>

          <p>
            가족을 사랑하고,<br />

            맛있는 것을 좋아하고,<br />

            소소한 순간에 행복해하는<br />

            윤서라는 사람이 참 좋아.
          </p>

          <p>
            앞으로도 많이 웃고<br />

            행복한 날들이 가득했으면 좋겠다.
          </p>

          <p>
            하나님 안에서 늘 건강하고,<br />

            걸어가는 모든 길 위에<br />

            평안이 함께하길 기도할게.
          </p>

          <p>
            Peace Be With You<br />

            John 20:19
          </p>

          <div class="signature">- 준영 -</div>
        </div>
      </div>
    </div>

    <script>
      let current = 0;

      const stories = [
        `
🤍 가족을 너무 사랑하는 윤서

<br><br>

가족 이야기를 할 때마다

따뜻해지는 모습이 참 좋았어.
`,

        `
🍛 카레를 굳이 밖에서<br>
사 먹긴 싫다던 윤서

<br><br>

솔직히...

그건 나도 인정 ㅎㅎ

집에서 먹는 카레가 맛있긴 하지 😌
`,

        `
🥘 곱창이 최애 음식인 윤서

<br><br>

이건 나도 좋아!

같이 맛있는 거 먹으러 가자 😊
`,

        `
🍗 닭발과 똥집을 먹으며<br>
행복해하던 윤서

<br><br>

닭발은 아직 나에게 조금 어렵지만...

똥집은 인정 ㅎㅎ
`,

        `
🍝 뇨끼를 좋아하는 윤서

<br><br>

이건 완전 공감!

나도 뇨끼 너무 좋아 😊
`
      ];

      function playMusic() {
        let music = document.getElementById("bgm");

        music.play();

        document.querySelector(".music-btn").innerHTML =
          "🎵 음악이 흐르고 있어";

        document.getElementById("startStory").classList.remove("hidden");
      }

      function startStory() {
        document.querySelector(".message").innerHTML =
          "윤서에 대한<br>작은 이야기";

        document.getElementById("storyArea").style.display = "block";

        document.getElementById("startStory").style.display = "none";

        nextStory();
      }

      function nextStory() {
        if (current >= stories.length) {
          celebrate();

          document.getElementById("storyArea").style.display = "none";

          document.getElementById("letter").classList.add("show");

          return;
        }

        document.getElementById("storyCard").innerHTML = stories[current];

        document.getElementById("count").innerHTML =
          `${current + 1} / ${stories.length}`;

        current++;
      }

      function celebrate() {
        let items = ["🎉", "🎊", "✨", "🎈"];

        for (let i = 0; i < 100; i++) {
          let c = document.createElement("div");

          c.className = "confetti";

          c.innerHTML = items[Math.floor(Math.random() * items.length)];

          c.style.left = Math.random() * 100 + "vw";

          c.style.fontSize = 20 + Math.random() * 20 + "px";

          c.style.animationDelay = Math.random() * 2 + "s";

          document.body.appendChild(c);

          setTimeout(() => {
            c.remove();
          }, 4000);
        }
      }
    </script>
  </body>
</html>
